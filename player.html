<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Моя музыка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .cover {
            width: 200px;
            height: 200px;
            border-radius: 20px;
            margin: 0 auto 20px;
            background: #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            overflow: hidden;
        }

        .cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .song-title {
            font-size: 24px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .artist-name {
            font-size: 18px;
            color: #718096;
            margin-bottom: 20px;
        }

        .genre-tag {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        audio {
            width: 100%;
            margin: 15px 0;
            border-radius: 30px;
        }

        audio::-webkit-media-controls-panel {
            background: #f7fafc;
        }

        .status {
            color: #718096;
            font-size: 14px;
            margin-top: 10px;
        }

        .status .emoji {
            font-size: 18px;
        }

        .footer-note {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #edf2f7;
            font-size: 13px;
            color: #a0aec0;
        }

        /* === АДМИН-ПАНЕЛЬ (видна только вам) === */
        .admin-panel {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background: #f7fafc;
            border-radius: 15px;
            border: 2px dashed #cbd5e0;
        }

        .admin-panel.visible {
            display: block;
        }

        .admin-panel h3 {
            font-size: 16px;
            color: #2d3748;
            margin-bottom: 15px;
        }

        .admin-panel .form-group {
            margin-bottom: 12px;
            text-align: left;
        }

        .admin-panel label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 4px;
        }

        .admin-panel input, 
        .admin-panel select,
        .admin-panel input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            transition: 0.3s;
            background: white;
        }

        .admin-panel input:focus,
        .admin-panel select:focus {
            outline: none;
            border-color: #667eea;
        }

        .admin-panel .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .admin-panel .btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        .admin-panel .btn-danger {
            background: #fc8181;
            margin-top: 10px;
        }

        .admin-panel .btn-danger:hover {
            background: #f56565;
        }

        .admin-toggle {
            margin-top: 15px;
            background: none;
            border: none;
            color: #a0aec0;
            font-size: 13px;
            cursor: pointer;
            text-decoration: underline;
        }

        .admin-toggle:hover {
            color: #718096;
        }

        /* Уведомления */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d3748;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            display: block;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .toast.success { background: #48bb78; }
        .toast.error { background: #fc8181; }

        @media (max-width: 480px) {
            .player-card { padding: 25px 20px; }
            .cover { width: 150px; height: 150px; font-size: 60px; }
            .song-title { font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="player-card" id="playerCard">
        <!-- Обложка -->
        <div class="cover" id="coverDisplay">
            🎵
        </div>

        <!-- Информация о треке -->
        <div class="song-title" id="songTitleDisplay">Нет трека</div>
        <div class="artist-name" id="artistDisplay">Загрузите свою музыку</div>
        <div class="genre-tag" id="genreDisplay">🎧</div>

        <!-- Аудиоплеер -->
        <audio controls id="audioPlayer">
            <source src="" type="audio/mpeg">
            Ваш браузер не поддерживает аудио.
        </audio>

        <div class="status">
            <span id="statusText">💿 Нажмите ▶ чтобы слушать</span>
        </div>

        <!-- Кнопка для админ-панели -->
        <button class="admin-toggle" onclick="toggleAdmin()">🔧 Управление треком</button>

        <!-- Админ-панель (только для вас) -->
        <div class="admin-panel" id="adminPanel">
            <h3>✏️ Редактировать трек</h3>
            
            <div class="form-group">
                <label>Название песни</label>
                <input type="text" id="editTitle" placeholder="Введите название">
            </div>

            <div class="form-group">
                <label>Исполнитель</label>
                <input type="text" id="editArtist" placeholder="Введите исполнителя">
            </div>

            <div class="form-group">
                <label>Жанр</label>
                <select id="editGenre">
                    <option value="pop">Поп</option>
                    <option value="rock">Рок</option>
                    <option value="hiphop">Хип-хоп</option>
                    <option value="electronic">Электроника</option>
                    <option value="jazz">Джаз</option>
                    <option value="classical">Классика</option>
                    <option value="other">Другое</option>
                </select>
            </div>

            <div class="form-group">
                <label>Обложка (JPG/PNG)</label>
                <input type="file" id="editCover" accept=".jpg,.jpeg,.png">
            </div>

            <div class="form-group">
                <label>Аудиофайл (MP3)</label>
                <input type="file" id="editAudio" accept=".mp3">
            </div>

            <button class="btn" onclick="saveSong()">💾 Сохранить изменения</button>
            <button class="btn btn-danger" onclick="deleteSong()">🗑️ Удалить трек</button>
        </div>

        <div class="footer-note">
            🎵 Моя музыкальная визитка
        </div>
    </div>

    <!-- Уведомления -->
    <div class="toast" id="toast"></div>

    <script>
        // ===== КЛЮЧ БЕЗОПАСНОСТИ =====
        // Это ваш секретный пароль. Измените его на свой!
        const ADMIN_PASSWORD = 'zawarka16@69';
        
        // ===== ХРАНИЛИЩЕ =====
        // Данные сохраняются в браузере и доступны только вам
        let songData = {
            title: '',
            artist: '',
            genre: 'pop',
            cover: null,  // base64 изображения
            audio: null   // base64 аудио
        };

        // ===== ЗАГРУЗКА СОХРАНЁННЫХ ДАННЫХ =====
        function loadSong() {
            const saved = localStorage.getItem('myPersonalSong');
            if (saved) {
                try {
                    songData = JSON.parse(saved);
                    updatePlayer();
                } catch(e) {
                    console.error('Ошибка загрузки:', e);
                }
            }
        }

        // ===== ОБНОВЛЕНИЕ ПЛЕЕРА =====
        function updatePlayer() {
            const title = document.getElementById('songTitleDisplay');
            const artist = document.getElementById('artistDisplay');
            const genre = document.getElementById('genreDisplay');
            const cover = document.getElementById('coverDisplay');
            const audio = document.getElementById('audioPlayer');
            const status = document.getElementById('statusText');

            if (songData.audio) {
                title.textContent = songData.title || 'Без названия';
                artist.textContent = songData.artist || 'Неизвестный исполнитель';
                genre.textContent = '🎵 ' + (songData.genre || 'pop');
                
                if (songData.cover) {
                    cover.innerHTML = `<img src="${songData.cover}" alt="Обложка">`;
                } else {
                    cover.innerHTML = '🎵';
                }
                
                audio.querySelector('source').src = songData.audio;
                audio.load();
                status.innerHTML = '✅ Готово к прослушиванию';
            } else {
                title.textContent = 'Нет трека';
                artist.textContent = 'Загрузите свою музыку';
                genre.textContent = '🎧';
                cover.innerHTML = '🎵';
                audio.querySelector('source').src = '';
                audio.load();
                status.innerHTML = '💿 Загрузите трек через админ-панель';
            }

            // Обновляем поля редактирования
            document.getElementById('editTitle').value = songData.title || '';
            document.getElementById('editArtist').value = songData.artist || '';
            document.getElementById('editGenre').value = songData.genre || 'pop';
        }

        // ===== СОХРАНЕНИЕ ТРЕКА =====
        function saveSong() {
            const title = document.getElementById('editTitle').value.trim();
            const artist = document.getElementById('editArtist').value.trim();
            const genre = document.getElementById('editGenre').value;
            const audioFile = document.getElementById('editAudio').files[0];
            const coverFile = document.getElementById('editCover').files[0];

            // Проверка пароля
            const password = prompt('Введите пароль для сохранения:');
            if (password !== ADMIN_PASSWORD) {
                showToast('❌ Неверный пароль!', 'error');
                return;
            }

            let updates = {};

            // Обновляем текстовые поля
            if (title) updates.title = title;
            if (artist) updates.artist = artist;
            updates.genre = genre;

            // Обработка обложки
            if (coverFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    updates.cover = e.target.result;
                    applyUpdates(updates);
                };
                reader.readAsDataURL(coverFile);
            } else {
                // Если обложка не выбрана, оставляем старую
                if (!songData.cover) {
                    // Можно установить дефолтную
                }
                applyUpdates(updates);
            }

            // Обработка аудио
            if (audioFile) {
                if (audioFile.size > 30 * 1024 * 1024) {
                    showToast('❌ Файл слишком большой (макс 30MB)', 'error');
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    updates.audio = e.target.result;
                    applyUpdates(updates);
                };
                reader.readAsDataURL(audioFile);
            } else {
                applyUpdates(updates);
            }
        }

        function applyUpdates(updates) {
            // Проверяем пароль ещё раз (на случай если вызвано напрямую)
            Object.assign(songData, updates);
            
            // Сохраняем в localStorage
            localStorage.setItem('myPersonalSong', JSON.stringify(songData));
            
            // Обновляем плеер
            updatePlayer();
            
            // Очищаем поля выбора файлов
            document.getElementById('editAudio').value = '';
            document.getElementById('editCover').value = '';
            
            showToast('✅ Трек успешно обновлён!', 'success');
        }

        // ===== УДАЛЕНИЕ ТРЕКА =====
        function deleteSong() {
            const password = prompt('Введите пароль для удаления:');
            if (password !== ADMIN_PASSWORD) {
                showToast('❌ Неверный пароль!', 'error');
                return;
            }

            if (confirm('Вы уверены, что хотите удалить трек?')) {
                localStorage.removeItem('myPersonalSong');
                songData = { title: '', artist: '', genre: 'pop', cover: null, audio: null };
                updatePlayer();
                showToast('🗑️ Трек удалён', 'success');
            }
        }

        // ===== ПОКАЗ/СКРЫТИЕ АДМИН-ПАНЕЛИ =====
        function toggleAdmin() {
            const panel = document.getElementById('adminPanel');
            if (panel.classList.contains('visible')) {
                panel.classList.remove('visible');
            } else {
                const password = prompt('Введите пароль для доступа к управлению:');
                if (password === ADMIN_PASSWORD) {
                    panel.classList.add('visible');
                    showToast('🔓 Доступ разрешён', 'success');
                } else if (password !== null) {
                    showToast('❌ Неверный пароль!', 'error');
                }
            }
        }

        // ===== УВЕДОМЛЕНИЯ =====
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ===== ПРОВЕРКА ПРИ ЗАГРУЗКЕ =====
        // Если в URL есть параметр ?edit=true - показываем админку
        window.addEventListener('load', function() {
            loadSong();
            
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('edit') === 'true') {
                setTimeout(() => {
                    const password = prompt('Введите пароль для управления:');
                    if (password === ADMIN_PASSWORD) {
                        document.getElementById('adminPanel').classList.add('visible');
                        showToast('🔓 Режим редактирования', 'success');
                    }
                }, 500);
            }
        });

        // ===== ГОРЯЧИЕ КЛАВИШИ =====
        document.addEventListener('keydown', function(e) {
            // Ctrl+E - открыть админку
            if (e.ctrlKey && e.key === 'e') {
                e.preventDefault();
                toggleAdmin();
            }
        });

        console.log('🎵 Music Player загружен!');
        console.log('🔑 Для управления используйте Ctrl+E или добавьте ?edit=true к URL');
        console.log('📌 Пароль:', ADMIN_PASSWORD);
    </script>

</body>
</html>
